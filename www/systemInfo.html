<!DOCTYPE HTML>
<html>
<head>
<title>信息</title>
<meta http-equiv="Expires" content="0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Cache-control" content="no-cache">
<meta http-equiv="Cache" content="no-cache">
	<link href="css/bootstrap.min.css" rel="stylesheet" type="text/css" media="all"/>
	<link href="css/my_style.css" rel="stylesheet" type="text/css" media="all"/>


<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<script>


    var xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function(){
	if(xhr.readyState == 4&&xhr.status == 200){ //根据返回状态值是否正确若成功执行下面语句
	var xmlDoc = xhr.responseXML;//取得返回请求
	var root = xmlDoc.getElementsByTagName("root")[0];//识别根标志root
	var data = root.getElementsByTagName("data");//识别子标志data

	const bandwidth={
		    0: "20MHz",
    		1: "10MHz",
    		2: "5MHz",
   	 		3: "3MHz",
    		4: "1.2MHz"
	};
//根据id改变相应div的值

	document.getElementById("ipaddr").innerText = data[0].childNodes[0].nodeValue;
	document.getElementById("runtimeid").innerText = data[1].childNodes[0].nodeValue;
	document.getElementById("device").innerHTML = data[2].childNodes[0].nodeValue;
	document.getElementById("g_ver").innerHTML = data[3].childNodes[0].nodeValue;
	document.getElementById("rf_freq").innerHTML = data[4].childNodes[0].nodeValue+"MHz";
	
	document.getElementById("m_txpower").innerHTML = data[6].childNodes[0].nodeValue+"dBm";
	document.getElementById("m_rate").innerHTML = data[7].childNodes[0].nodeValue;
	document.getElementById("m_type").innerHTML = data[8].childNodes[0].nodeValue;

	document.getElementById("m_chanbw").innerHTML = bandwidth[data[5].childNodes[0].nodeValue];

var tmptd = 
            "<tr>\n" +
            "<th>设备ID</th>\n" +
						"<th>节点IP</th>\n" +
						"<th>时间抖动</th>\n" +
						"<th>信噪比</th>\n" +
						"<th>信号强度</th>\n" +
						"<th>信道质量</th>\n" +
						"<th>物理层收速率统计(Mbps)</th>\n" +
						"<th>错误包</th>\n" +
						"<th>UCDS骨干</th>\n" +
						"<th>底噪</th>\n" +
            "</tr>";
var tmptd2 = "<tr>\n" +
            					"<th>设备ID</th>\n" +
						"<th>节点IP</th>\n" +

            "</tr>";
var tmptd3 = "<tr>\n" +

            "</tr>";
//列表初始化
m_list_table.innerHTML=tmptd;
m_list_table2.innerHTML=tmptd2;
freq_table.innerHTML=tmptd3;
//暂时在数据库预设了三个设备的存储空间，tr 三个td /td /tr为一个设备的一组数据
var i;
var v;
const baseOffset = 9;          // 基础信息后的起始偏移
const groupSize = 32;          // 每组设备参数数量


for(i=0;i<groupSize;i+=1){
	if(data[baseOffset+i+1*groupSize].childNodes[0].nodeValue!=0){     
	//根据信道质量（linkquality）选择速率系数v
		if(data[i+9+groupSize*5].childNodes[0].nodeValue==0){
			v=672;
		}
		if(data[i+baseOffset+groupSize*5].childNodes[0].nodeValue==1){
			v=896;
		}
		if(data[i+baseOffset+groupSize*5].childNodes[0].nodeValue==2){
			v=1344;
		}
		if(data[i+baseOffset+groupSize*5].childNodes[0].nodeValue==3){
			v=1792;
		}
		if(data[i+baseOffset+groupSize*5].childNodes[0].nodeValue==4){
			v=2688;
		}
		if(data[i+baseOffset+groupSize*5].childNodes[0].nodeValue==5){
			v=3584;
		}
		if(data[i+baseOffset+groupSize*5].childNodes[0].nodeValue==6){
			v=4032;
		}
		if(data[i+baseOffset+groupSize*5].childNodes[0].nodeValue==7){
			v=5376;
		}
		
		//一跳邻居列表
	m_list_table.innerHTML += '<tr>'+
'<td>'+data[i+baseOffset].childNodes[0].nodeValue+'</td>'+                 //设备ID
'<td>'+data[i+baseOffset+groupSize*1].childNodes[0].nodeValue+'</td>'+     //节点IP
'<td>'+data[i+baseOffset+groupSize*2].childNodes[0].nodeValue+'</td>'+     //时间抖动
'<td>'+data[i+baseOffset+groupSize*3].childNodes[0].nodeValue+'</td>'+     //信噪比
'<td>'+data[i+baseOffset+groupSize*4].childNodes[0].nodeValue+'</td>'+     //信号强度
'<td>'+data[i+baseOffset+groupSize*5].childNodes[0].nodeValue+'</td>'+     // 信道质量
'<td>'+data[i+baseOffset+groupSize*6].childNodes[0].nodeValue*v*8/100000000+'</td>'+       //物理层速率
'<td>'+data[i+baseOffset+groupSize*7].childNodes[0].nodeValue+'</td>'+      //错误包
'<td>'+data[i+baseOffset+groupSize*8].childNodes[0].nodeValue+'</td>'+      //UCDS骨干
'<td>'+data[i+baseOffset+groupSize*9].childNodes[0].nodeValue+'</td>'+       //底噪
'</tr>';
	}
}



for(i=0;i<groupSize;i+=1){
//两跳邻居列表
	if(data[i+baseOffset+groupSize*11].childNodes[0].nodeValue!=0){
	m_list_table2.innerHTML += '<tr>'+
'<td>'+data[i+baseOffset+groupSize*10].childNodes[0].nodeValue+'</td>'+        
'<td>'+data[i+baseOffset+groupSize*11].childNodes[0].nodeValue+'</td>'+
'</tr>';
	}
}

for(i=0;i<groupSize;i+=1){
//跳频频点集
	if(data[i+baseOffset+groupSize*12].childNodes[0].nodeValue!=0){
	freq_table.innerHTML += '<tr>'+
'<td>'+data[i+baseOffset+groupSize*12].childNodes[0].nodeValue+'</td>'+
'</tr>';
	}
}

		}
	}
var intervalId;

intervalId = setInterval(function () {
    xhr.open('GET', "cgi-bin/csystemInfo", true);//打开后端文件的路径
    xhr.send();//向后端发送请求
}, 1000);
    xhr.open('GET', "cgi-bin/csystemInfo", true);//打开后端文件的路径
    xhr.send();//向后端发送请求



</script>

</head>
<body>
<form class="form-horizontal" action="/cgi-bin/csystemInfo" method="get">
	<!--<form class="form"-->
	<div class="panel panel-danger  col-xs-offset-1 col-sm-10" style="border-color: #bce8f1;">
		<div class="panel-heading  row" style="background-color:#d9edf7;color: #31708f;border-color: #bce8f1;">
		<h1 class ="panel-title"style="font-size: 28px;">Wideband Network Waveform</h1>
		</div>
	</div>
	<div class="panel panel-danger  col-xs-offset-1 col-sm-10">
		
		<div class="panel-heading  row">
			<h3  class="panel-title">系统参数</h3>
		</div>
		<div class="panel-body">
			<div class="form-group">
				<div class="col-sm-3 ">
					<label class="col-sm-5 control-label" style="text-align: right">IP地址 : </label>
					<label class="col-sm-7 control-label"  id="ipaddr" style="text-align: left"></label>
				</div>
				<div class="col-sm-5">
					<label class="col-sm-5  control-label" style="text-align: right">运行时间 : </label>
					<label class="col-sm-7  control-label" id="runtimeid" style="text-align: left"></label>
				</div>
				<div class="col-sm-4">
					<label class="col-sm-5 control-label " style="text-align: right" >设备号 : </label>
					<label class="col-sm-7  control-label"  id="device"style="text-align: left"></label>
				</div>
			</div>
		</div>
	</div>
	<div class="panel panel-danger  col-xs-offset-1 col-sm-10">
		<div class="panel-heading  row">
			<h3  class="panel-title">参数</h3>
		</div>
		<div class="panel-body">
			<div class="panel panel-success  col-sm-5">
				<div class="panel-heading">
					<h3  class="panel-title">工作参数</h3>
				</div>
				<div class="panel-body">
					<div class="form-group row">
						<label >固件版本:</label>
						<label id="g_ver" >暂无数据</label>
					</div>
					<div class="form-group row">
						<label >工作频率:</label>
						<label id="rf_freq" >暂无数据</label>
					</div>
					<div class="form-group row">
						<label >信号带宽:</label>
						<label id="m_chanbw" >暂无数据</label>
					</div>
					<div class="form-group row">
						<label >输出功率:</label>
						<label  id="m_txpower">暂无数据</label>
					</div>
					<div class="form-group row">
						<label >业务速率等级:</label>
						<label id="m_rate"  >暂无数据</label>
					</div>
					<div class="form-group row">
						<label  >节点类型:</label>
						<label id="m_type" >mesh</label>
					</div>
				</div>
			</div>


		</div>
	</div>

	<div class="panel panel-danger  col-xs-offset-1 col-sm-10">
		<div class="panel-heading  row">
			<h3  class="panel-title">设备列表</h3>
		</div>
		<div class="panel-body">
			<div class="panel panel-success   col-sm-10">
				<div class="panel-heading">
					<h3  class="panel-title">一跳邻居列表</h3>
				</div>
				<table class="table" id="m_list_table">
						<tr>UCDS算法根据网络连通情况分布式推举若干节点作为网络骨干。通过骨干转发，降低控制信令网络拥塞</tr>
					<tr>
						<th>设备ID</th>
						<th>节点IP</th>
						<th>时间抖动</th>
						<th>信噪比</th>
						<th>信号强度</th>
						<th>信道质量</th>
						<th>物理层收速率统计(Mbps)</th>
						<th>错误包</th>
						<th>UCDS骨干</th>
						<th>底噪</th>
					</tr>


				</table>
			</div>
			<div class="panel panel-success   col-sm-10">
				<div class="panel-heading">
					<h3  class="panel-title">二跳邻居列表</h3>
				</div>
				<table class="table" id="m_list_table2">
					<tr>
						<th>设备ID</th>
						<th>节点IP</th>
					</tr>

				</table>
			</div>

		</div>

	</div>
	<div class="panel panel-danger  col-xs-offset-1 col-sm-10">
		<div class="panel-heading  row">
			<h3  class="panel-title">跳频频点集</h3>
		</div>
		<div class="panel-body">
			<div class="panel panel-success   col-sm-10">
				<div class="panel-heading">
					<h3  class="panel-title">频点列表</h3>
				</div>
				<table class="table" id="freq_table">
					<tr>
						<th>暂无数据</th>
					</tr>

				</table>
			</div>

		</div>

	</div>
</form>

</body>
</html>
