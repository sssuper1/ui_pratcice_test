	var i=0,j=0;

for(i=0;i<480;i+=15){

	 softver[j]=data[i+13].childNodes[0].nodeValue;
	 hardver[j]=data[i+14].childNodes[0].nodeValue;
	j++;
};
	var k=0,m=0,n=0;

	flowrate[m][n]=data[480+k+2].childNodes[0].nodeValue;
	k+=3;
	}
}

            function newLink(nodeA, nodeZ, text, direction){
                var link = new JTopo.Link(nodeA, nodeZ, text);  
		link.direction = direction || 'horizontal';      
                link.lineWidth = 1; // 线宽
                link.bundleOffset = 0; // 折线拐角处的长度
                link.bundleGap = 20; // 线条之间的间隔
                link.textOffsetY = 15; // 文本偏移量（向下3个像素）
		link.textOffsetX = -3; // 文本偏移量（向下3个像素）
                link.strokeColor = '0,200,255';
		//link.arrowsRadius = 10; //箭头大小

                scene.add(link);
                return link;
