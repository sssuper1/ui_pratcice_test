<!DOCTYPE HTML>
<html>
<head>
    <title>串口配置</title>
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-control" content="no-cache">
    <meta http-equiv="Cache" content="no-cache">
    <link href="css/bootstrap.min.css" rel="stylesheet" type="text/css" media="all"/>
    <link href="css/my_style.css" rel="stylesheet" type="text/css" media="all"/>
    <link href="css/dialog.css" rel="stylesheet" type="text/css" media="all"/>

    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
   <script>

	var xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function(){
	if(xhr.readyState == 4&&xhr.status == 200){ //根据返回状态值是否正确若成功执行下面语句
	var xmlDoc = xhr.responseXML;//取得返回请求
	var root = xmlDoc.getElementsByTagName("root")[0];//识别根标志root
	var data = root.getElementsByTagName("data");//识别子标志data

//根据id改变相应div的值

	document.getElementById("r_baudrate0").value = data[0].childNodes[0].nodeValue;
	document.getElementById("r_dID0").value = data[1].childNodes[0].nodeValue;
	document.getElementById("r_dport0").value = data[2].childNodes[0].nodeValue;
	document.getElementById("r_lport0").value = data[3].childNodes[0].nodeValue;
	document.getElementById("r_baudrate1").value = data[4].childNodes[0].nodeValue;
	document.getElementById("r_dID1").value = data[5].childNodes[0].nodeValue;
	document.getElementById("r_dport1").value = data[6].childNodes[0].nodeValue;
	document.getElementById("r_lport1").value = data[7].childNodes[0].nodeValue;
		}
	}

    xhr.open('GET', "cgi-bin/cserialInfo", true);//打开后端文件的路径
    xhr.send();//向后端发送请求


    </script>


</head>
<body>
<form class="form-horizontal" action="/cgi-bin/cserialInfo" method="post">

						  </div>

							  <label class="col-sm-3 control-label" >目的ID:</label>

								  <input  class="form-control"  type="text" id="r_dID0" name="r_dID0"/>
							  </div>
						  </div>
						  <div class="form-group">
							  <label class="col-sm-3 control-label" >目的端口:</label>

								  <input  class="form-control"  type="text" id="r_dport0" name="r_dport0"/>

			  		</div>

			<div class="panel panel-success  col-xs-offset-1 col-sm-5">
					<div class="panel-heading">
						<h3  class="panel-title">串口2配置</h3>

								  <input  class="form-control"  type="text" id="r_dID1" name="r_dID1"/>

						  <div class="form-group">
							  <label class="col-sm-3 control-label" >目的端口:</label>

			  		</div>
			</div>
			 <div class="form-group">
				<input  class="col-sm-offset-2 col-sm-4 btn btn-info" style="min-height: 25px;min-width: 50px;"   type="submit" value="修改" id="btn1"/>

			 </div>			

			
         </div>
		  
    </div>


</form>

</html>
