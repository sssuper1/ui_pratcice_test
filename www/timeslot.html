    <title>Grid</title>
    <style>
        .grid {
            width: 600px;
            height: 685px;
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            grid-template-rows: repeat(16, 1fr);
        }
        .grid div {
            border: 1px solid black;
        }

        .grid2 {
            width: 42px;
            height: 42px;
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            grid-template-rows: repeat(1, 1fr);
        }
        .grid2 div {
            border: 1px solid black;
        }	
    </style>

<script>
var color = []; // 替换为你想要设置的颜色

    var xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function(){
	if(xhr.readyState == 4&&xhr.status == 200){ //根据返回状态值是否正确若成功执行下面语句
	var xmlDoc = xhr.responseXML;//取得返回请求
	var root = xmlDoc.getElementsByTagName("root")[0];//识别根标志root
	var data = root.getElementsByTagName("data");//识别子标志data

	var tmptd = 
            "<tr>\n" +
            "<td>"+"打印占用的控制时隙号:\n";
	var tmptd2 = "<tr>\n" +

            "</tr>";

	control_table.innerHTML="<tr>\n"+"<td>"+data[0].childNodes[0].nodeValue+"</td>"+"</tr>";
	business_table.innerHTML=tmptd;
	freq_table.innerHTML=tmptd2;

	var i=0;
	for(i=0;i<224;i++){
		if(data[i+1].childNodes[0].nodeValue==2||data[i].childNodes[0].nodeValue==9){
		business_table.innerHTML += ((Math.trunc(i-1/7)+1)*2+i)+'\n';
		}
	}

	for(i=0;i<64;i++){
		if(data[i+225].childNodes[0].nodeValue!=0){
		freq_table.innerHTML += '<tr>'+
				'<td>'+data[i+225].childNodes[0].nodeValue+'</td>'+
			'</tr>';}
	}

	}
	}
var intervalId;

intervalId = setInterval(function () {
    xhr.open('GET', "cgi-bin/ctimeslot", true);//打开后端文件的路径

}, 1000);

</script>
</head>
