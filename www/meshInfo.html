// 设置工作模式切换处理
function setupWorkModeHandler() {
    var workModeSelect = document.getElementById("workmode");
    var freqSelect = document.getElementById("rf_freq");
    var freqInputs = document.querySelectorAll("#adaptive-freq-inputs input");
    var hiddenFreqInput = document.getElementById("hidden_rf_freq");

    var hiddenSelFreq_2 = document.getElementById("hidden_select_freq_2");

    var selectFreq1 = document.getElementById("m_select_freq1");
    var selectFreq2 = document.getElementById("m_select_freq2");
    var selectFreq3 = document.getElementById("m_select_freq3");
	
	
    function updateControls() {
        var mode = workModeSelect.value;
		console.log("Current mode:", mode);
		if (mode === "4") {
            // 自适应选频模式
            // 禁用 rf_freq 下拉框，不清除其值
            freqSelect.setAttribute("disabled", "disabled");
            freqSelect.removeAttribute("name");

            // 设置隐藏字段，用于提交 rf_freq（保留原值）
            hiddenFreqInput.setAttribute("name", "rf_freq");
            hiddenFreqInput.value = freqSelect.value;

            // 启用自适应选频输入框
            freqInputs.forEach(input => {
                input.removeAttribute("disabled");
                input.removeAttribute("readOnly");
                input.setAttribute("required", "required");
                input.style.backgroundColor = ""; // 恢复背景色
            });
           // 移除隐藏字段，不提交
//            hiddenSelFreq_1.removeAttribute("name");
 //           hiddenSelFreq_1.value = "";
 //           hiddenSelFreq_2.removeAttribute("name");
 //           hiddenSelFreq_2.value = "";
 //           hiddenSelFreq_3.removeAttribute("name");
 //           hiddenSelFreq_3.value = "";
 //           hiddenSelFreq_4.removeAttribute("name");
 //           hiddenSelFreq_4.value = "";


        } else if (mode === "1") {
            // 定频模式
            freqSelect.removeAttribute("disabled");
            freqSelect.setAttribute("name", "rf_freq");

            // 移除隐藏字段，不提交
            hiddenFreqInput.removeAttribute("name");
            hiddenFreqInput.value = "";

            // 禁用自适应频率输入框，但保留原值
            // 使用 readOnly 代替 disabled，确保数据能提交，维持后端 C 代码的索引映射
            freqInputs.forEach(input => {
                input.removeAttribute("disabled");
                input.setAttribute("readOnly", "readOnly");
                input.removeAttribute("required");
                input.style.backgroundColor = "#eee"; // 视觉上模拟 disabled
            });

            // 为定频模式的频率选择框添加 name 属性
            //selectFreq1.setAttribute("name", "m_select_freq1");
            //selectFreq2.setAttribute("name", "m_select_freq2");
            //selectFreq3.setAttribute("name", "m_select_freq3");			
        }
		else; 

        //console.log("selectFreq1 name:", selectFreq1.getAttribute("name"));
        //console.log("selectFreq2 name:", selectFreq2.getAttribute("name"));
       // console.log("selectFreq3 name:", selectFreq3.getAttribute("name"));
    }
    // 绑定事件
    workModeSelect.addEventListener("change", updateControls);

    // 页面加载时初始化一次
    updateControls();
}

// 设置频率输入验证
function setupFrequencyValidation() {
    var freqInputs = document.querySelectorAll("#adaptive-freq-inputs input");
    
    freqInputs.forEach(function(input) {
        input.addEventListener("input", function() {
            var value = parseInt(this.value);
            if (isNaN(value)) {
                return;
            }
            
            // 强制限制范围
            if (value < 225) {
                this.value = 225;
            } else if (value > 2500) {
                this.value = 2500;
            }
        });
        
        // 失去焦点时验证
        input.addEventListener("blur", function() {
            var value = parseInt(this.value);
            if (isNaN(value) || value < 225 || value > 2500) {
                this.classList.add("is-invalid");
            } else {
                this.classList.remove("is-invalid");
            }
        });
    });
}
