<script >	
	var id =[];
	var time = [];
	var ip=[];
	var txpower= [];
	var bw=[];
	var freq=[];
	var mcs=[];
	var mode=[];
	var interval=[];
	var maxnb=[];
	var nbor=[];
	var lotd=[];
	var latd=[];
	var softver=[];
	var hardver=[];

	var snr=[];
	var getlevel=[];
	var flowrate=[];
	var r=0,t=0;
for(r=0;r<32;r++){
snr[r]=new Array();
getlevel[r]=new Array();
flowrate[r]=new Array();
for(t=0;t<32;t++){
snr[r][t]=new Array();
getlevel[r][t]=new Array();
flowrate[r][t]=new Array();
}
}

    var xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function(){
	if(xhr.readyState == 4&&xhr.status == 200){ //根据返回状态值是否正确若成功执行下面语句
	var xmlDoc = xhr.responseXML;//取得返回请求
	var root = xmlDoc.getElementsByTagName("root")[0];//识别根标志root
	var data = root.getElementsByTagName("data");//识别子标志data

	var i=0,j=0;


for(i=0;i<480;i+=15){
	id[j]=data[i].childNodes[0].nodeValue;
	time[j]=data[i+1].childNodes[0].nodeValue;
	 ip[j]=data[i+2].childNodes[0].nodeValue;
	 txpower[j]=data[i+3].childNodes[0].nodeValue;
	 bw[j]=data[i+4].childNodes[0].nodeValue;
	 freq[j]=data[i+5].childNodes[0].nodeValue;
	 mcs[j]=data[i+6].childNodes[0].nodeValue;
	 mode[j]=data[i+7].childNodes[0].nodeValue;
	 interval[j]=data[i+8].childNodes[0].nodeValue;
	 maxnb[j]=data[i+9].childNodes[0].nodeValue;
	 nbor[j]=data[i+10].childNodes[0].nodeValue;
	 lotd[j]=data[i+11].childNodes[0].nodeValue;
	 latd[j]=data[i+12].childNodes[0].nodeValue;
	 softver[j]=data[i+13].childNodes[0].nodeValue;
	 hardver[j]=data[i+14].childNodes[0].nodeValue

	j++;
};

	var k=0,m=0,n=0;
for(m=0;m<32;m++){
	for(n=0;n<32;n++){
	snr[m][n]=data[480+k].childNodes[0].nodeValue;
	getlevel[m][n]=data[480+k+1].childNodes[0].nodeValue;
	flowrate[m][n]=data[480+k+2].childNodes[0].nodeValue;
	k+=3;
	}
}

//根据id改变相应div的值

//	document.getElementById("m_txpower").value = data[0].childNodes[0].nodeValue;

	}
